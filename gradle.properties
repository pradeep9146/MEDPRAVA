# Project-wide Gradle settings

# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when building from the command line, check
# build.gradle files instead.

# When configured, Gradle will run in offline mode and will not attempt to download dependencies.
org.gradle.offline=false

# Android Gradle plugin settings
android.useNewApkCreator=true
android.enableNewResourceShrinker=true

# Kotlin
kotlin.incremental=true
kotlin.incremental.js=true
kotlin.jvm.target.validation.mode=warn

# Enable R8 full mode
android.enableR8.fullMode=false

# Project properties
KOTLIN_VERSION=1.9.10
AGP_VERSION=8.1.4
COMPILE_SDK=34
TARGET_SDK=34
MIN_SDK=28
